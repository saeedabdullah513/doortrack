# ── DoorTrack Nginx config ──
# Copy to: /etc/nginx/sites-available/doortrack
# Then: ln -s /etc/nginx/sites-available/doortrack /etc/nginx/sites-enabled/
# Replace "yourdomain.com" with your actual domain

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP to HTTPS (after Certbot runs, this block is auto-updated)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.com www.yourdomain.com;

    # SSL certs (filled in by Certbot automatically)
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # File upload limit (for future photo capture feature)
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # Next.js static files — served directly by Nginx (faster, no Node.js hit)
    location /_next/static/ {
        alias /var/www/doortrack/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /icons/ {
        alias /var/www/doortrack/public/icons/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /manifest.json {
        alias /var/www/doortrack/public/manifest.json;
        expires 1d;
    }

    # Everything else → Next.js app on port 3000
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
